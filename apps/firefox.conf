# firefox.conf - minimum allow-list for a fully functional browser
#
# don't search for doors to close. there are none.
# start with zero. open only the ones the app needs.
#
# this is one app. yours will differ - same idea, different doors.
#
# notes:
#   x11 users: add x11 (or fallback-x11) to ALLOW_SOCKET
#   minimize/maximize buttons may be missing - the D-Bus proxy in --sandbox
#     filters the Settings portal path GTK uses to read button layout.
#     not standardized yet (xdg-desktop-portal#956).
#     use Super+H (minimize) & Super+Up (maximize) instead :)

APP_ID="org.mozilla.firefox"

# network - without it, a browser has nothing to do
ALLOW_SHARE=(network)

# wayland - display. pulseaudio - audio/video playback
ALLOW_SOCKET=(wayland pulseaudio)

# GPU - WebGL, video decode, smooth scrolling
ALLOW_DEVICE=(dri)

# downloads only - no documents, no desktop, no home
ALLOW_FILESYSTEM=(xdg-download)

# profile data survives between launches (bookmarks, logins, extensions, cache)
PERSIST=(.mozilla .config/mozilla .cache/mozilla .local/share/mozilla)

# force dark theme (value set here, not from host)
SET_ENV=(GTK_THEME=Adwaita:dark)

# Firefox on Linux hands URLs to the running instance over its own session D-Bus name.
ALLOW_DBUS_TALK=(org.mozilla.firefox.*)
ALLOW_DBUS_OWN=(org.mozilla.firefox.*)

# pass host's activation tokens through (without these, new windows won't take focus)
# MOZ_APP_REMOTINGNAME: webapp profiles set this for separate dock icon (Wayland app_id)
ALLOW_ENV=(DESKTOP_STARTUP_ID XDG_ACTIVATION_TOKEN MOZ_APP_REMOTINGNAME)

# prevent screen dimming during video playback (Firefox calls Inhibit portal via D-Bus)
# requires patched flatpak with --dbus-call support:
# https://github.com/q1sh101/flatpak  (branch: add-dbus-call-option)
# remove ALLOW_DBUS_CALL if using vanilla flatpak
ALLOW_DBUS_CALL=(
  "org.freedesktop.portal.Desktop=org.freedesktop.portal.Inhibit.*"
)

