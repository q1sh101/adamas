# example.conf - per-app allow-list
# cp example.conf myapp.conf && edit APP_ID
#
# everything denied by --sandbox. () = blocked.
# add only what the app needs.

APP_ID="com.example.AppName"

# --- share ---
ALLOW_SHARE=()                # e.g. network | ipc

# --- socket ---
ALLOW_SOCKET=()               # e.g. wayland | pulseaudio | x11 | fallback-x11 | cups

# --- device ---
ALLOW_DEVICE=()               # e.g. dri | input | all

# --- feature ---
ALLOW_FEATURE=()              # e.g. bluetooth | per-app-dev-shm

# --- filesystem ---
ALLOW_FILESYSTEM=()           # e.g. xdg-download | ~/Documents:ro

# --- session D-Bus ---
ALLOW_DBUS_TALK=()            # e.g. org.freedesktop.Notifications | org.kde.*
ALLOW_DBUS_OWN=()             # e.g. org.example.App

# --- system D-Bus ---
ALLOW_SYSTEM_DBUS_TALK=()     # e.g. org.freedesktop.login1 | org.freedesktop.UPower
ALLOW_SYSTEM_DBUS_OWN=()      # e.g. org.example.SystemService

# --- a11y D-Bus ---
ALLOW_A11Y_OWN=()             # e.g. org.a11y.atspi.Registry

# --- USB ---
ALLOW_USB=()                  # e.g. vnd:1234+dev:5678 | cls:03

# --- persist ---
# without this, app data lives in RAM and dies on exit
# (.) = full disk | e.g. (.mozilla .config/app) = by name to disk
PERSIST=()

# --- policy ---
ADD_POLICY=()                 # e.g. filesystems.host=reset

# --- env ---
# baseline: HOME PATH XDG_RUNTIME_DIR DBUS_SESSION_BUS_ADDRESS
#   WAYLAND_DISPLAY DISPLAY LANG
ALLOW_ENV=()                  # pass host value through (e.g. DESKTOP_STARTUP_ID)
SET_ENV=()                    # force a value (e.g. GTK_THEME=Adwaita)

# --- portal ---
# 8 denied by default: camera | microphone | speakers | location
#   notifications | screenshot | screencast | background
ALLOW_PORTAL=()               # e.g. notifications:notification | devices:camera
